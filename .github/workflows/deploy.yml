name: Deploy Worker

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: my-worker
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: mod-mail
  GCP_PROJECT_ID: mod-mail-490516
  CLOUD_RUN_REGION: europe-west1
  SERVICE_ACCOUNT_EMAIL: github-deploy-bot@mod-mail-490516.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/376050965276/locations/global/workloadIdentityPools/github-actions-pool/providers/github

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Authenticate to GCP via Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      # 3. Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGISTRY

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t $REGISTRY/${{ env.GCP_PROJECT_ID }}/$REPOSITORY/$IMAGE_NAME:latest .

      # 5. Push Docker image to Artifact Registry
      - name: Push Docker image
        run: docker push $REGISTRY/${{ env.GCP_PROJECT_ID }}/$REPOSITORY/$IMAGE_NAME:latest

      # 6. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          SERVICE_NAME=discord-bot-id-$SHORT_SHA
          gcloud run deploy $SERVICE_NAME \
            --image $REGISTRY/${{ env.GCP_PROJECT_ID }}/$REPOSITORY/$IMAGE_NAME:latest \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account cloud-run-service@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances 1 \
            --update-env-vars DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }},FIRESTORE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}

      # 7. Disable old Cloud Run workers (logs remain in Cloud Logging after deletion)
      - name: Disable old Cloud Run workers
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          CURRENT_SERVICE=discord-bot-id-$SHORT_SHA
          OLD_SERVICES=$(gcloud run services list \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --format="value(metadata.name)" \
            --filter="metadata.name:discord-bot-id" \
            | grep -v "^${CURRENT_SERVICE}$" || true)
          if [ -n "$OLD_SERVICES" ]; then
            echo "Disabling old workers:"
            echo "$OLD_SERVICES"
            while IFS= read -r service; do
              echo "Deleting $service (logs retained in Cloud Logging)"
              gcloud run services delete "$service" \
                --region ${{ env.CLOUD_RUN_REGION }} \
                --platform managed \
                --quiet || echo "Warning: could not delete $service"
            done <<< "$OLD_SERVICES"
          else
            echo "No old workers found."
          fi