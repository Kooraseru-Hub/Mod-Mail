name: Deploy Worker

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: my-worker
  REGISTRY: us-east1-docker.pkg.dev
  REPOSITORY: mod-mail
  GCP_PROJECT_ID: mod-mail-490516
  ZONE: us-east1-b
  INSTANCE_NAME: discord-bot
  MACHINE_TYPE: e2-micro
  SERVICE_ACCOUNT_EMAIL: github-deploy-bot@mod-mail-490516.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/376050965276/locations/global/workloadIdentityPools/github-actions-pool/providers/github

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Authenticate to GCP via Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT_EMAIL }}

      # 3. Enable required APIs (no-op if already enabled)
      - name: Enable required GCP APIs
        run: |
          gcloud services enable compute.googleapis.com --project=${{ env.GCP_PROJECT_ID }}
          gcloud services enable artifactregistry.googleapis.com --project=${{ env.GCP_PROJECT_ID }}

      # 4. Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      # 5. Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest .

      # 6. Push Docker image to Artifact Registry
      - name: Push Docker image
        run: docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # 7. Deploy or update Container-Optimized OS VM
      #    - First deploy: creates the instance with startup-script.sh stored in metadata
      #    - Subsequent deploys: updates container-image metadata and resets the instance
      #      (reset triggers a reboot which re-runs the startup script with the new image)
      - name: Deploy or update VM container
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

          if gcloud compute instances describe ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} --project=${{ env.GCP_PROJECT_ID }} > /dev/null 2>&1; then
            echo "Instance exists — updating image metadata and rebooting..."
            gcloud compute instances add-metadata ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --metadata=container-image=$IMAGE,discord-token=${{ secrets.DISCORD_TOKEN }}
            gcloud compute instances reset ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} \
              --project=${{ env.GCP_PROJECT_ID }}
          else
            echo "Creating new e2-micro COS instance..."
            gcloud compute instances create ${{ env.INSTANCE_NAME }} \
              --zone=${{ env.ZONE }} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --machine-type=${{ env.MACHINE_TYPE }} \
              --image-family=cos-stable \
              --image-project=cos-cloud \
              --service-account=cloud-run-service@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
              --scopes=cloud-platform \
              --no-address \
              --metadata=container-image=$IMAGE,discord-token=${{ secrets.DISCORD_TOKEN }},gcp-project=${{ env.GCP_PROJECT_ID }},registry=${{ env.REGISTRY }} \
              --metadata-from-file=startup-script=startup-script.sh
          fi
